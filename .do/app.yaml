
alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED

features:
- buildpack-stack=ubuntu-24

name: peace-web
region: tor

ingress:
  rules:
  - component:
      name: root
    match:
      path:
        prefix: /

services:
  - name: egui-trunk
    image:
      registry_type: DOCR
      registry: ghcr.io
      repository: lilyanavalley/peace
      tag: latest
      deploy_on_push:
        enabled: true
    instance_count: 2
    instance_size_slug: basic-xxs
    http_port: 8080
    run_command: trunk serve --release
