
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22

name: peace-web
region: tor

ingress:
  rules:
    - match:
        path:
          prefix: /
      component:
        name: egui-trunk

services:
  - name: egui-trunk
    image:
      registry_type: GHCR
      registry: ghcr.io
      repository: lilyanavalley/peace
      tag: latest
      deploy_on_push:
        enabled: true
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    run_command: trunk serve --release
